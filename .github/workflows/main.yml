name: Mississippi Remodelers Scraper

on:
  workflow_dispatch:

jobs:
  scrape-mississippi-part1:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Scraper Part 1
        run: |
          docker run \
            -v $PWD/mississippi_remodelers_part1.txt:/input.txt \
            -v $PWD:/output \
            gosom/google-maps-scraper \
            -input /input.txt \
            -results /output/mississippi_remodelers_part1_leads.csv \
            -depth 10 \
            -exit-on-inactivity 10m
      
      - name: Upload Results Part 1
        uses: actions/upload-artifact@v4
        with:
          name: mississippi-remodelers-part1-leads
          path: mississippi_remodelers_part1_leads.csv
          retention-days: 90

  scrape-mississippi-part2:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Scraper Part 2
        run: |
          docker run \
            -v $PWD/mississippi_remodelers_part2.txt:/input.txt \
            -v $PWD:/output \
            gosom/google-maps-scraper \
            -input /input.txt \
            -results /output/mississippi_remodelers_part2_leads.csv \
            -depth 10 \
            -exit-on-inactivity 10m
      
      - name: Upload Results Part 2
        uses: actions/upload-artifact@v4
        with:
          name: mississippi-remodelers-part2-leads
          path: mississippi_remodelers_part2_leads.csv
          retention-days: 90
